# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: "Test Suite and Linting"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        python -m pip install poetry
        poetry install --extras glmm
    - name: Test with pytest
      run: |
        poetry run pytest tests
    - name: Verify package imports without optional extras
      run: |
        python -m venv /tmp/no-extras
        /tmp/no-extras/bin/pip install --upgrade pip
        /tmp/no-extras/bin/pip install .
        /tmp/no-extras/bin/python -c "import category_encoders; e = category_encoders.OneHotEncoder()"
        /tmp/no-extras/bin/python -c "
        import category_encoders
        try:
          category_encoders.GLMMEncoder
        except ImportError as e:
          assert 'statsmodels' in str(e), str(e)
        else:
          raise AssertionError('GLMMEncoder should fail without statsmodels')
        "
